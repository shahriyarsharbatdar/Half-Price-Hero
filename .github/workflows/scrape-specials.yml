name: Scrape half-price specials

# DISABLED (schedule trigger removed): Coles and Woolworths both actively
# block automated scraping, even with the mitigations in scraper/ (stealth
# fingerprint, AU locale, jittered pacing, retries) — reliable especially
# from a datacenter IP like a GitHub Actions runner. Specials are now kept
# up to date manually instead: download the weekly catalogue PDF from each
# retailer's site and upload it at /admin, where Claude extracts the
# half-price items (see server/src/services/catalogue.js).
#
# The scraper code and this workflow are left in place, disabled, in case
# scraping becomes viable again later (e.g. via a residential proxy) — run
# it manually from the Actions tab any time with workflow_dispatch.
on:
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # installs the playwright package + downloads Chromium (postinstall
      # hook) + the system libraries Chromium needs on a bare Ubuntu runner
      - run: npm ci

      # Woolworths blocks headless Chromium specifically (confirmed: it's
      # served an Akamai "Access Denied" page in headless mode but not
      # headed) — xvfb-run gives Playwright a real virtual display so it can
      # launch non-headless on a display-less CI runner.
      - run: sudo apt-get update && sudo apt-get install -y xvfb

      - run: xvfb-run -a npm start
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_TOKEN: ${{ secrets.SCRAPER_TOKEN }}
